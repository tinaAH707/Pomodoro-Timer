<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My OC Pomodoro Timer!</title>

    <link rel="stylesheet" href="">
</head>

<body>
    <body>
        <div class="header">
            <figure class="settings">
                <img src="" alt="">
            </figure>

            <div class="oc-toggle">
                <figure>
                    <div class="aki">
                        <img src="" alt="" class="selected">
                        <img src="" alt="" class="unselcted">
                    </div>


                    <div class="mimi">
                        <img src="content/images/Mimi Clicked4.png" alt="" class="selected">
                        <img src="content/images/Mimi Clicked.png" alt="" class="unselcted">
                    </div>

                </figure>
            </div>

        </div>

        <div class="animation">
            <video id="aki-animation" src=""></video>
            <video id="mimi-animation" src=""></video>
        </div>

        <!--Timer-->

        <div class="buttons">
            <div class="go">GO!</div>
            <div class="stop">STOP!</div>
        </div>
        
        <div class="do-you-task">
            <p>do yer tasks</p>
            <ul>
                <li>task 1</li>
                <li>task 2</li>
                <li>task 3</li>
            </ul><!--basically this shoudl automatically add on when you add a task..??idk how lmao-->
        </div>

        <!--make the overlay for the settings-->
    
    </body>
    
</body>
</html>
